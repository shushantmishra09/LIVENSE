</div>

        <footer class="mt-6 text-center">
            <p id="refreshNotice" class="text-xs text-slate-400 font-medium tracking-wide">
                Data automatically refreshes every <span id="seconds">10</span> seconds during market hours.
            </p>
        </footer>
    </div>

    <script>
        // REPLACE with your actual Google Script Web App URL
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyuZjax1MdlFZhdBvmskxmUPQNxgzYsCDTzLUwX3p3-CzpDTgZOKQNzV2c_K1qnqAJx/exec"; 
        
        let countdown = 10;
        let watchlist = ["NIFTY 50", "RELIANCE", "TCS", "HDFCBANK", "INFY"];

        async function fetchMarketData() {
            const statusLabel = document.getElementById('timer'); // Assuming you have a timer label
            try {
                // Fetching data for all symbols in the watchlist
                const response = await fetch(`${googleScriptUrl}?symbols=${watchlist.join(',')}`);
                const result = await response.json();
                const tableBody = document.getElementById('tableBody');
                
                tableBody.innerHTML = '';
                
                result.data.forEach(stock => {
                    const change = parseFloat(stock.pChange);
                    const color = change >= 0 ? "text-green-600" : "text-red-600";
                    const bg = change >= 0 ? "bg-green-50" : "bg-red-50";
                    
                    tableBody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap font-bold text-slate-800">${stock.symbol}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right font-mono font-medium">₹${stock.lastPrice}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right font-mono font-bold ${color}">
                                <span class="px-2 py-1 rounded ${bg}">${change > 0 ? '+' : ''}${stock.pChange}%</span>
                            </td>
                        </tr>`;
                });

                // Reset countdown only after successful fetch
                countdown = 10; 
            } catch (error) {
                console.error("Fetch error:", error);
                // If it fails, wait a bit longer before retrying
                countdown = 5; 
            }
        }

        // Timer Logic: Updates the UI every second
        setInterval(() => {
            countdown--;
            
            // Update the Footer text dynamically
            const secondsSpan = document.getElementById('seconds');
            if(secondsSpan) secondsSpan.innerText = countdown > 0 ? countdown : 10;

            if (countdown <= 0) {
                fetchMarketData();
            }
        }, 1000);

        // Function to add new stocks (from your search bar)
        function addToWatchlist() {
            const input = document.getElementById('stockSearch');
            const val = input.value.toUpperCase().trim();
            if (val && !watchlist.includes(val)) {
                watchlist.push(val);
                input.value = '';
                fetchMarketData(); // Immediate refresh
            }
        }

        // Initial load
        fetchMarketData();
    </script>
</body>
</html>
